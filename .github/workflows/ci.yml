name: CI

on:
  push:
  pull_request:

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libcairo2-dev \
            pkg-config \
            libffi-dev

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run mypy
        run: uv run mypy musurgia

  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libcairo2-dev \
            pkg-config \
            libffi-dev \
            fontconfig

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group test

      - name: Set fontconfig for tests
        run: |
          echo "FONTCONFIG_FILE=${{ github.workspace }}/musurgia/tests/graphics/svg/fonts/fonts.conf" >> $GITHUB_ENV
          echo "FONTCONFIG_PATH=${{ github.workspace }}/musurgia/tests/graphics/svg/fonts" >> $GITHUB_ENV

      - name: Debug fontconfig
        run: |
          echo "FONTCONFIG_FILE=$FONTCONFIG_FILE"
          echo "FONTCONFIG_PATH=$FONTCONFIG_PATH"
          fc-match --format="%{file}" "DejaVu Sans"
          ls -la ${{ github.workspace }}/musurgia/tests/graphics/svg/fonts/
          cat ${{ github.workspace }}/musurgia/tests/graphics/svg/fonts/fonts.conf

      - name: Run pytest
        run: uv run pytest -m "not nonci and not wip"
